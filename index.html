nt-placeholder-count=\"3\">\n              <div style=\"background:#fff;border:1px solid #e4e7e0;border-radius:12px;padding:15px 18px;display:flex;justify-content:space-between;align-items:center;gap:14px\">\n                <div style=\"min-width:0\"><div style=\"display:flex;align-items:center;gap:9px;margin-bottom:3px\"><span style=\"font-weight:600;font-size:14px;color:#262b26\">{{ i.name }}<\u002Fspan><span style=\"{{ i.pillStyle }}\">{{ i.actionLabel }}<\u002Fspan><\u002Fdiv><div style=\"font-size:12.5px;color:#8a9187\">{{ i.subtitle }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"display:flex;gap:8px;flex-shrink:0\"><sc-for list=\"{{ i.actions }}\" as=\"a\" hint-placeholder-count=\"2\"><button sc-camel-on-click=\"{{ a.onClick }}\" style=\"{{ a.style }}\">{{ a.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ gEmptyList }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fff;border:1px solid #e4e7e0;border-radius:12px;padding:30px;text-align:center;color:#8a9187;font-size:14px\">{{ gEmptyText }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ gHasStats }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px\">\n            <sc-for list=\"{{ gStats }}\" as=\"s\" hint-placeholder-count=\"3\">\n              <div style=\"background:#fff;border:1px solid #e4e7e0;border-radius:12px;padding:17px 18px\"><div style=\"font-size:12px;font-weight:600;color:#6b746c;margin-bottom:8px\">{{ s.label }}<\u002Fdiv><div style=\"font-family:Newsreader,serif;font-size:28px;color:{{ s.color }}\">{{ s.value }}<\u002Fdiv><div style=\"font-size:12px;color:#9aa196;margin-top:5px\">{{ s.sub }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"padding:18px 28px;background:#fff;border-top:1px solid #eef0ea;display:flex;justify-content:space-between;align-items:center\">\n        <button sc-camel-on-click=\"{{ gBack }}\" style=\"{{ gBackStyle }}\">Back<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ gNext }}\" style=\"background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px 22px;font-size:14px;font-weight:600\">{{ gNextLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ONBOARDING -->\n  <sc-if value=\"{{ onboardOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div>\n    <div style=\"position:fixed;inset:0;background:rgba(38,43,38,.45);z-index:80;animation:cmtFade .2s ease\"><\u002Fdiv>\n    <div style=\"position:fixed;inset:0;z-index:81;display:flex;align-items:center;justify-content:center;padding:20px;pointer-events:none\">\n    <div style=\"width:540px;max-width:94vw;max-height:90vh;overflow-y:auto;background:#fff;border-radius:20px;box-shadow:0 28px 72px rgba(38,43,38,.28);animation:cmtPop .3s ease;padding:38px 40px;pointer-events:auto\">\n      <div style=\"width:46px;height:46px;border-radius:13px;background:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:20px\">\n        <div style=\"display:flex;gap:3px;align-items:flex-end\">\n          <div style=\"width:4px;height:11px;background:#fff;border-radius:2px;opacity:.55\"><\u002Fdiv>\n          <div style=\"width:4px;height:17px;background:#fff;border-radius:2px\"><\u002Fdiv>\n          <div style=\"width:4px;height:8px;background:#fff;border-radius:2px;opacity:.55\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:Newsreader,serif;font-size:28px;color:#262b26;margin-bottom:8px;letter-spacing:-.01em\">Welcome<\u002Fdiv>\n      <div style=\"font-size:15px;color:#6b746c;line-height:1.6;margin-bottom:26px\">This keeps your caseload out of your head. Add your clients once, then a weekly glance tells you what needs deciding and whether you can take someone new.<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:16px;margin-bottom:30px\">\n        <div style=\"display:flex;gap:14px;align-items:flex-start\">\n          <div style=\"width:26px;height:26px;border-radius:8px;background:color-mix(in oklab,var(--accent) 13%,white);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0\">1<\u002Fdiv>\n          <div><div style=\"font-weight:600;font-size:14.5px;color:#262b26;margin-bottom:2px\">Add your clients<\u002Fdiv><div style=\"font-size:13px;color:#8a9187;line-height:1.5\">Frequency, block start and length. It works out sessions left, when the block ends, and how much of a slot each one uses.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:flex-start\">\n          <div style=\"width:26px;height:26px;border-radius:8px;background:color-mix(in oklab,var(--accent) 13%,white);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0\">2<\u002Fdiv>\n          <div><div style=\"font-weight:600;font-size:14.5px;color:#262b26;margin-bottom:2px\">Run the weekly review<\u002Fdiv><div style=\"font-size:13px;color:#8a9187;line-height:1.5\">A short guided routine flags who's finishing, who to chase, and which slots have freed — with one click to act.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:flex-start\">\n          <div style=\"width:26px;height:26px;border-radius:8px;background:color-mix(in oklab,var(--accent) 13%,white);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0\">3<\u002Fdiv>\n          <div><div style=\"font-weight:600;font-size:14.5px;color:#262b26;margin-bottom:2px\">Everything stays on your device<\u002Fdiv><div style=\"font-size:13px;color:#8a9187;line-height:1.5\">No account, no cloud, nothing sent anywhere. Back it up anytime from the Backup tab.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap\">\n        <button sc-camel-on-click=\"{{ onboardAdd }}\" style=\"background:var(--accent);color:#fff;border:none;border-radius:11px;padding:12px 20px;font-size:14px;font-weight:600\">Add my first client<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ onboardSample }}\" style=\"background:#fff;color:#3c443b;border:1px solid #d9dcd5;border-radius:11px;padding:12px 20px;font-size:14px;font-weight:600\">Explore with sample data<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ dismissOnboard }}\" style=\"background:none;color:#8a9187;border:none;padding:12px 10px;font-size:14px;font-weight:600;margin-left:auto\">I'll look around<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- DELETE CONFIRM -->\n  <sc-if value=\"{{ confirmDelOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div>\n    <div sc-camel-on-click=\"{{ cancelDeleteAll }}\" style=\"position:fixed;inset:0;background:rgba(38,43,38,.4);z-index:70;animation:cmtFade .2s ease\"><\u002Fdiv>\n    <div style=\"position:fixed;inset:0;z-index:71;display:flex;align-items:center;justify-content:center;padding:20px;pointer-events:none\">\n    <div style=\"width:400px;max-width:92vw;background:#fff;border-radius:16px;box-shadow:0 24px 64px rgba(38,43,38,.24);animation:cmtPop .24s ease;padding:28px;pointer-events:auto\">\n      <div style=\"font-family:Newsreader,serif;font-size:22px;color:#262b26;margin-bottom:8px\">Delete everything?<\u002Fdiv>\n      <div style=\"font-size:13.5px;color:#6b746c;line-height:1.6;margin-bottom:22px\">This permanently removes all clients, waitlist and settings from this device. It cannot be undone. Export a backup first if you might need it.<\u002Fdiv>\n      <div style=\"display:flex;gap:10px;justify-content:flex-end\">\n        <button sc-camel-on-click=\"{{ cancelDeleteAll }}\" style=\"background:#fff;color:#6b746c;border:1px solid #d9dcd5;border-radius:9px;padding:10px 16px;font-size:14px;font-weight:600\">Cancel<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ doDeleteAll }}\" style=\"background:#a4432e;color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:600\">Delete everything<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:860},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#4f7d6e&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#4f7d6e&quot;,&quot;#3e6e8e&quot;,&quot;#7a6a8a&quot;,&quot;#9a6a4a&quot;]},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Comfortable&quot;,&quot;options&quot;:[&quot;Comfortable&quot;,&quot;Compact&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    const defaults = {\n      clients: [], waitlist: [], templates: [], pin: null, seeded: false,\n      settings: { yourName:'', target:8, weeks:12, lead:2, frequencies:[\n        {name:'Weekly', load:1, gap:1},\n        {name:'Fortnightly', load:0.5, gap:2},\n        {name:'Every 3 weeks', load:0.33, gap:3},\n        {name:'Monthly', load:0.25, gap:4},\n        {name:'Every 6 weeks', load:0.17, gap:6},\n        {name:'One-off', load:1, gap:1},\n      ]}\n    };\n    let saved = {};\n    try { saved = JSON.parse(localStorage.getItem('cmt_v1')||'{}'); } catch(e){}\n    const persisted = Object.assign({}, defaults, saved);\n    if(saved.settings) persisted.settings = Object.assign({}, defaults.settings, saved.settings);\n    if(!persisted.templates || !persisted.templates.length) persisted.templates = this.defaultTemplates();\n    this.state = Object.assign(persisted, {\n      view:'week', locked:false, unlocked:true,\n      drawerOpen:false, draft:null,\n      waitDrawerOpen:false, wdraft:null,\n      msgOpen:false, msgTitle:'', msgSub:'', msgBody:'', msgCopied:false, pendingAction:null,\n      guidedOpen:false, gStep:0,\n      onboardOpen: !persisted.onboarded,\n      noticeDismissed:false,\n      filter:'all', confirmDelOpen:false,\n      fsSupported: (typeof window!=='undefined' && !!window.showSaveFilePicker),\n      fsLinked:false, fsName:'', fsStatus:'', fsError:''\n    });\n  }\n\n  componentDidMount(){\n    if(!this.state.fsSupported) return;\n    this.idbGet('saveHandle').then(async (h)=>{\n      if(!h) return;\n      try{\n        const perm = await h.queryPermission({mode:'readwrite'});\n        if(perm==='granted'){\n          this._handle = h;\n          this.setState({fsLinked:true, fsName:h.name, fsStatus:'Auto-saving to '+h.name});\n        } else {\n          this._handle = h;\n          this.setState({fsLinked:true, fsName:h.name, fsStatus:'Reconnect needed — click to resume auto-save'});\n        }\n      }catch(e){}\n    }).catch(()=>{});\n  }\n\n  // ---------- IndexedDB (stores the file handle only) ----------\n  idb(){\n    if(this._idb) return this._idb;\n    this._idb = new Promise((res,rej)=>{\n      const r = indexedDB.open('cmt_fs', 1);\n      r.onupgradeneeded = ()=>{ r.result.createObjectStore('kv'); };\n      r.onsuccess = ()=>res(r.result); r.onerror = ()=>rej(r.error);\n    });\n    return this._idb;\n  }\n  async idbGet(k){ const db=await this.idb(); return new Promise((res,rej)=>{ const t=db.transaction('kv','readonly').objectStore('kv').get(k); t.onsuccess=()=>res(t.result); t.onerror=()=>rej(t.error); }); }\n  async idbSet(k,v){ const db=await this.idb(); return new Promise((res,rej)=>{ const t=db.transaction('kv','readwrite').objectStore('kv').put(v,k); t.onsuccess=()=>res(); t.onerror=()=>rej(t.error); }); }\n  async idbDel(k){ const db=await this.idb(); return new Promise((res,rej)=>{ const t=db.transaction('kv','readwrite').objectStore('kv').delete(k); t.onsuccess=()=>res(); t.onerror=()=>rej(t.error); }); }\n\n  // ---------- persistence ----------\n  PKEYS = ['clients','waitlist','templates','pin','seeded','settings','onboarded'];\n  buildSlice(source){\n    const src = source || this.state;\n    const slice={}; this.PKEYS.forEach(k=>slice[k]=src[k]);\n    slice.exportedAt=new Date().toISOString(); slice.app='Caseload Management Tool';\n    return slice;\n  }\n  save(next){\n    const merged = Object.assign({}, this.state, next);\n    const slice = {}; this.PKEYS.forEach(k=>slice[k]=merged[k]);\n    try { localStorage.setItem('cmt_v1', JSON.stringify(slice)); } catch(e){}\n    if(this._handle) this.scheduleFileWrite();\n  }\n\n  // ---------- File System Access auto-save ----------\n  async connectSaveFile(){\n    if(!this.state.fsSupported) return;\n    try{\n      const h = await window.showSaveFilePicker({\n        suggestedName:'caseload.json',\n        types:[{description:'Caseload backup', accept:{'application/json':['.json']}}]\n      });\n      this._handle = h;\n      await this.idbSet('saveHandle', h);\n      this.setState({fsLinked:true, fsName:h.name, fsStatus:'Auto-saving to '+h.name, fsError:''});\n      await this.writeToFile();\n    }catch(e){ if(e && e.name!=='AbortError') this.setState({fsError:'Could not link a file.'}); }\n  }\n  async reconnectSaveFile(){\n    if(!this._handle){ return this.connectSaveFile(); }\n    try{\n      const perm = await this._handle.requestPermission({mode:'readwrite'});\n      if(perm==='granted'){\n        this.setState({fsLinked:true, fsName:this._handle.name, fsStatus:'Auto-saving to '+this._handle.name, fsError:''});\n        await this.writeToFile();\n      } else {\n        this.setState({fsError:'Permission was declined.'});\n      }\n    }catch(e){ this.setState({fsError:'Could not reconnect.'}); }\n  }\n  async disconnectSaveFile(){\n    this._handle=null;\n    try{ await this.idbDel('saveHandle'); }catch(e){}\n    this.setState({fsLinked:false, fsName:'', fsStatus:'', fsError:''});\n  }\n  scheduleFileWrite(){\n    clearTimeout(this._fsTimer);\n    this._fsTimer = setTimeout(()=>this.writeToFile(), 400);\n  }\n  currentData(){\n    let raw=null; try{ raw=localStorage.getItem('cmt_v1'); }catch(e){}\n    let o; try{ o = raw ? JSON.parse(raw) : this.buildSlice(this.state); }catch(e){ o = this.buildSlice(this.state); }\n    o.exportedAt=new Date().toISOString(); o.app='Caseload Management Tool';\n    return JSON.stringify(o,null,2);\n  }\n  async writeToFile(){\n    if(!this._handle) return;\n    if(this._writing){ this._pending=true; return; }   // single-flight: coalesce overlapping writes\n    this._writing=true;\n    try{\n      const perm = await this._handle.queryPermission({mode:'readwrite'});\n      if(perm!=='granted'){ this.setState({fsLinked:true, fsStatus:'Reconnect needed — click to resume auto-save'}); return; }\n      const w = await this._handle.createWritable();\n      await w.write(this.currentData());\n      await w.close();\n      const t=new Date();\n      this.setState({fsStatus:'Saved to '+this._handle.name+' · '+t.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), fsError:''});\n    }catch(e){ this.setState({fsError:'Auto-save failed — the file may have moved or be open elsewhere. Reconnect it.'}); }\n    finally{\n      this._writing=false;\n      if(this._pending){ this._pending=false; this.writeToFile(); }\n    }\n  }\n  set(next){ this.save(next); this.setState(next); }\n\n  // ---------- date helpers ----------\n  today(){ const d=new Date(); d.setHours(12,0,0,0); return d; }\n  parse(iso){ if(!iso) return null; const p=String(iso).split('-'); if(p.length<3) return null; return new Date(+p[0], +p[1]-1, +p[2], 12); }\n  toIso(d){ if(!d) return ''; return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }\n  addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }\n  diffDays(a,b){ return Math.round((a-b)/86400000); }\n  mondayOf(d){ const wd=(d.getDay()+6)%7; return this.addDays(d,-wd); }\n  fmt(d){ return d ? d.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short'}) : ''; }\n  fmtLong(d){ return d ? d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'}) : ''; }\n  trimNum(n){ return String(Math.round(n*100)/100); }\n\n  freq(name){ return this.state.settings.frequencies.find(f=>f.name===name) || {load:1, gap:1}; }\n\n  // ---------- client computation ----------\n  compute(cl){\n    const f = this.freq(cl.frequency);\n    const load = +f.load || 0, gap = +f.gap || 1;\n    const start = this.parse(cl.blockStart);\n    const len = +cl.blockLength || 0;\n    const push = +cl.pushedBack || 0;\n    const today = this.today();\n    let sessionsLeft = null, blockEnds = null;\n    if(cl.name && len){\n      if(!start){ sessionsLeft = len; }\n      else {\n        const elapsed = this.diffDays(today, start) - push*7;\n        const used = elapsed < 0 ? 0 : Math.min(len, Math.floor(elapsed/(gap*7))+1);\n        sessionsLeft = len - used;\n      }\n      if(start) blockEnds = this.addDays(start, (len-1)*gap*7 + push*7);\n    }\n    // action\n    const lead = +this.state.settings.lead || 0;\n    let action='ok';\n    if(cl.status==='Discharged') action='done';\n    else if(cl.status==='Holding'){\n      const rb = this.parse(cl.replyBy);\n      if(!rb) action='set-reply';\n      else if(today >= rb) action='chase';\n      else action='awaiting';\n    } else {\n      if(sessionsLeft===null || blockEnds===null) action='fill';\n      else if(sessionsLeft<=0 || blockEnds < today) action = cl.decided ? 'decided' : 'ended';\n      else if(blockEnds <= this.addDays(today, lead*7)) action = cl.decided ? 'decided' : 'decide';\n      else if(blockEnds <= this.addDays(today, lead*14)) action='review';\n      else action='ok';\n    }\n    return Object.assign({}, cl, {load, gap, sessionsLeft, blockEnds, len, action});\n  }\n\n  slotsUsedAt(computed, ref){\n    return computed.reduce((sum,c)=>{\n      let occ=0;\n      if(c.status==='Active') occ = 1 - ((c.blockEnds && c.blockEnds < ref && c.rebook==='Likely to finish') ? 1 : 0);\n      else if(c.status==='Holding') occ = 1;\n      return sum + c.load*occ;\n    },0);\n  }\n  slotsRemainAt(computed, ref){ // best-case load (only definite-continue occupy after end)\n    return computed.reduce((sum,c)=>{\n      if(c.status!=='Active') return sum + (c.status==='Holding'?0:0);\n      const ended = c.blockEnds && c.blockEnds < ref;\n      const occ = ended ? (c.rebook==='Likely to continue'?1:0) : 1;\n      return sum + c.load*occ;\n    },0);\n  }\n\n  ACT = {\n    'ended':{label:'Block ended',tone:'red'},\n    'decide':{label:'Decide now',tone:'red'},\n    'chase':{label:'Chase or release',tone:'red'},\n    'review':{label:'Review soon',tone:'amber'},\n    'awaiting':{label:'Awaiting reply',tone:'amber'},\n    'set-reply':{label:'Set reply-by',tone:'amber'},\n    'fill':{label:'Add block details',tone:'grey'},\n    'ok':{label:'On track',tone:'green'},\n    'decided':{label:'Decided',tone:'grey'},\n    'done':{label:'Discharged',tone:'grey'}\n  };\n  tonePill(tone){\n    const map = {\n      red:{bg:'#f7e6e0',color:'#a4432e'}, amber:{bg:'#f6efd8',color:'#8a6d1f'},\n      green:{bg:'#e6f0e8',color:'#3a6b4f'}, grey:{bg:'#eef0ea',color:'#7a827d'}\n    };\n    const c = map[tone]||map.grey;\n    return `display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:600;background:${c.bg};color:${c.color};white-space:nowrap`;\n  }\n  btn(kind){\n    if(kind==='primary') return 'background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12.5px;font-weight:600;white-space:nowrap';\n    if(kind==='danger') return 'background:#fff;color:#a4432e;border:1px solid #e7c9c0;border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:600;white-space:nowrap';\n    return 'background:#fff;color:#5c645a;border:1px solid #dde0d8;border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:600;white-space:nowrap';\n  }\n\n  rowActions(c){\n    const stop = (fn)=>(e)=>{ if(e&&e.stopPropagation) e.stopPropagation(); fn(); };\n    const a=[];\n    if(c.action==='ended'||c.action==='decide'){\n      a.push({label:'Invite back',kind:'primary',onClick:stop(()=>this.inviteBack(c))});\n      a.push({label:'Decided',kind:'ghost',onClick:stop(()=>this.markDecided(c.id))});\n    } else if(c.action==='chase'){\n      a.push({label:'Send chase',kind:'primary',onClick:stop(()=>this.openTemplateFor(c,1))});\n      a.push({label:'Release',kind:'danger',onClick:stop(()=>this.release(c))});\n    } else if(c.action==='awaiting'||c.action==='set-reply'){\n      a.push({label:'Send chase',kind:'ghost',onClick:stop(()=>this.openTemplateFor(c,1))});\n      a.push({label:'Release',kind:'danger',onClick:stop(()=>this.release(c))});\n    } else if(c.action==='done'){\n      a.push({label:'Reactivate',kind:'ghost',onClick:stop(()=>this.update(c.id,{status:'Active'}))});\n    } else if(c.action==='decided'){\n      a.push({label:'Undo',kind:'ghost',onClick:stop(()=>this.update(c.id,{decided:false}))});\n    }\n    return a.map(x=>({label:x.label, onClick:x.onClick, style:this.btn(x.kind)}));\n  }\n\n  subtitle(c){\n    if(c.action==='ended') return 'Block finished '+this.fmt(c.blockEnds)+' — invite them to re-book before offering the slot on.';\n    if(c.action==='decide') return 'Block ends '+this.fmt(c.blockEnds)+' — decide whether it continues.';\n    if(c.action==='chase') return 'Reply-by ('+this.fmt(this.parse(c.replyBy))+') has passed. Chase, or release the slot.';\n    if(c.action==='awaiting') return 'Holding their slot until '+this.fmt(this.parse(c.replyBy))+'.';\n    if(c.action==='set-reply') return 'On hold — set a reply-by date to ring-fence the slot.';\n    if(c.action==='review') return 'Block ends '+this.fmt(c.blockEnds)+'.';\n    return c.notes || '';\n  }\n\n  // ---------- mutations ----------\n  update(id, patch){\n    const clients = this.state.clients.map(c=>c.id===id?Object.assign({},c,patch):c);\n    this.set({clients});\n  }\n  markDecided(id){ this.update(id,{decided:true}); }\n  inviteBack(c){\n    const lead = +this.state.settings.lead||2;\n    const replyBy = this.toIso(this.addDays(this.today(), lead*7));\n    this.openTemplateFor(Object.assign({},c,{replyBy}),0,{id:c.id, name:c.name, patch:{status:'Holding', replyBy, decided:true}, confirmLabel:'Confirm — hold slot', done:'held for '+c.name});\n  }\n  release(c){\n    this.openTemplateFor(c,2,{id:c.id, name:c.name, patch:{status:'Discharged'}, confirmLabel:'Confirm — release slot', done:'slot released'});\n  }\n  confirmPending(){ const p=this.state.pendingAction; if(p){ this.update(p.id, p.patch); } this.set({msgOpen:false, pendingAction:null, msgCopied:false}); }\n\n  // ---------- templates ----------\n  builtinTemplates(){\n    return [\n      {title:'1. End of block — invitation to continue', body:\n\"Hi [Contact name],\\n\\nIt's been a real pleasure working with [Client] over the last few weeks, and they've made lovely progress — particularly with [specific goal].\\n\\nWe've now reached the end of this block of sessions. I'd be very happy to continue with another block to build on where we've got to, if you'd like to.\\n\\nI want to be upfront that my availability is limited and spaces do fill up quickly. I'd love to keep [Client]'s usual slot, so if you'd like to carry on, just let me know by [date] and I'll hold the place. If the timing isn't right just now, that's absolutely fine — do stay in touch and I'll always do my best to fit you back in.\\n\\nWarm wishes,\\n[Your name]\"},\n      {title:'2. Friendly chase — reply-by approaching', body:\n\"Hi [Contact name],\\n\\nJust a quick note following my last message about continuing [Client]'s sessions — no pressure at all, I know how busy things get! I'm holding the slot for now, but I'll need to confirm my schedule by [date], so I wanted to check whether you'd like to carry on with another block.\\n\\nA quick yes or no is all I need and I'll take care of the rest.\\n\\nWarm wishes,\\n[Your name]\"},\n      {title:'3. Releasing the slot — kind close', body:\n\"Hi [Contact name],\\n\\nI haven't heard back, so I'll assume the timing isn't quite right at the moment — which is completely fine. I'll free up [Client]'s slot for now, but please don't hesitate to get in touch whenever you'd like to pick things back up, and I'll do my very best to find a space.\\n\\nIt's been a pleasure working with [Client], and I wish you all the best.\\n\\nWarm wishes,\\n[Your name]\"},\n      {title:'4. Waitlist — keeping warm', body:\n\"Hi [Contact name],\\n\\nJust a quick message to let you know [Client] is still on my waiting list and very much in my thoughts — you haven't been forgotten. I don't have a suitable space just yet, but as soon as one comes up that fits, I'll be in touch straight away. Thank you so much for your patience.\\n\\nWarm wishes,\\n[Your name]\"},\n      {title:'5. Waitlist — a space has come up', body:\n\"Hi [Contact name],\\n\\nGood news — a space has become available that I think would suit [Client] well: [day / time / frequency]. I'd love to offer it to you. Spaces like this don't tend to stay open long, so if you'd like to take it, please let me know by [date] and I'll book you straight in.\\n\\nWarm wishes,\\n[Your name]\"}\n    ];\n  }\n  ROLES = ['invite','chase','release','waitlist-warm','waitlist-offer'];\n  defaultTemplates(){\n    const core=this.builtinTemplates().map((t,i)=>({id:'t_'+this.ROLES[i], role:this.ROLES[i], title:t.title, body:t.body}));\n    const extras=[\n      {id:'t_welcome', role:'custom', title:'New client — welcome & first session', body:\n\"Hi [Contact name],\\n\\nLovely to have [Client] booked in — I'm really looking forward to getting started. Our first session is [day / time], and there's nothing you need to prepare; just come as you are.\\n\\nIf anything changes before then, or you have any questions, do get in touch. See you soon!\\n\\nWarm wishes,\\n[Your name]\"},\n      {id:'t_reminder', role:'custom', title:'Session reminder', body:\n\"Hi [Contact name],\\n\\nJust a friendly reminder that [Client]'s next session is [day / time]. Looking forward to seeing you — let me know if anything's changed.\\n\\nWarm wishes,\\n[Your name]\"}\n    ];\n    return core.concat(extras);\n  }\n  templateByIndex(idx){\n    const role=this.ROLES[idx];\n    const found=(this.state.templates||[]).find(t=>t.role===role);\n    return found || this.defaultTemplates()[idx];\n  }\n  tplField(id, field){ return (e)=>{ const templates=this.state.templates.map(t=>t.id===id?Object.assign({},t,{[field]:e.target.value}):t); this.set({templates}); }; }\n  addTemplate(){ const t={id:'t'+Date.now()+Math.random().toString(36).slice(2,5), role:'custom', title:'New template', body:''}; this.set({templates:this.state.templates.concat([t]), view:'messages'}); }\n  setTemplateRole(id, role){ const templates=this.state.templates.map(t=>{ const nt=Object.assign({},t); if(role!=='custom' && t.id!==id && t.role===role) nt.role='custom'; if(t.id===id) nt.role=role; return nt; }); this.set({templates}); }\n  deleteTemplate(id){ this.set({templates:this.state.templates.filter(t=>t.id!==id)}); }\n  fill(body, c){\n    const name = c && c.name ? c.name : '[Client]';\n    const contact = c && c.contact ? c.contact : '[Contact name]';\n    const date = c && c.replyBy ? this.fmtLong(this.parse(c.replyBy)) : '[date]';\n    const you = this.state.settings.yourName || '[Your name]';\n    return body.split('[Client]').join(name).split('[Contact name]').join(contact)\n      .split('[date]').join(date).split('[Your name]').join(you);\n  }\n  openTemplateFor(c, idx, pending){\n    const t = this.templateByIndex(idx);\n    this.set({msgOpen:true, msgCopied:false, msgTitle:t.title.replace(/^\\d+\\.\\s*/,''), msgSub: c&&c.name?('For '+c.name):'', msgBody:this.fill(t.body,c), pendingAction:pending||null});\n  }\n\n  // ---------- input handlers ----------\n  h(field){ return (e)=>{ const d=Object.assign({},this.state.draft); d[field]=e.target.value; this.setState({draft:d}); }; }\n  wh(field){ return (e)=>{ const d=Object.assign({},this.state.wdraft); d[field]=e.target.value; this.setState({wdraft:d}); }; }\n  sHandler(field){ return (e)=>{ const s=Object.assign({},this.state.settings); s[field]=e.target.value; this.set({settings:s}); }; }\n\n  openAdd(){ this.set({drawerOpen:true, draft:{id:null, name:'', contact:'', frequency:'Weekly', blockStart:this.toIso(this.mondayOf(this.today())), blockLength:6, pushedBack:0, status:'Active', replyBy:'', rebook:'', decided:false, notes:''}}); }\n  openEdit(c){ this.set({drawerOpen:true, draft:Object.assign({}, c)}); }\n  cancelDraft(){ this.set({drawerOpen:false, draft:null}); }\n  saveDraft(){\n    const d=this.state.draft; if(!d || !d.name.trim()){ this.cancelDraft(); return; }\n    const clean = {id:d.id||('c'+Date.now()+Math.random().toString(36).slice(2,6)), name:d.name.trim(), contact:d.contact||'', frequency:d.frequency, blockStart:d.blockStart, blockLength:+d.blockLength||0, pushedBack:+d.pushedBack||0, status:d.status, replyBy:d.replyBy||'', rebook:d.rebook||'', decided:!!d.decided, notes:d.notes||''};\n    let clients;\n    if(d.id) clients=this.state.clients.map(c=>c.id===d.id?clean:c);\n    else clients=this.state.clients.concat([clean]);\n    this.set({clients, drawerOpen:false, draft:null});\n  }\n  deleteDraft(){ const d=this.state.draft; this.set({clients:this.state.clients.filter(c=>c.id!==d.id), drawerOpen:false, draft:null}); }\n\n  openAddWait(){ this.set({waitDrawerOpen:true, wdraft:{id:null, name:'', need:'Weekly', added:this.toIso(this.today()), lastContacted:this.toIso(this.today()), notes:''}}); }\n  openEd
