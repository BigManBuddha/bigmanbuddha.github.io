document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

didn't match.<\u002Fdiv><\u002Fsc-if>\n        <div style=\"height:14px\"><\u002Fdiv>\n        <button sc-camel-on-click=\"{{ submitPin }}\" style=\"width:100%;background:var(--accent);color:#fff;border:none;border-radius:11px;padding:11px;font-size:14px;font-weight:600\">Unlock<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ unlocked }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"display:flex;min-height:100vh\">\n\n    <!-- SIDEBAR -->\n    <aside style=\"width:236px;flex-shrink:0;background:#fbfcfa;border-right:1px solid #e4e7e0;padding:22px 16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh\">\n      <div style=\"display:flex;align-items:center;gap:11px;padding:4px 8px 20px\">\n        <div style=\"width:34px;height:34px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0\">\n          <div style=\"display:flex;gap:2.5px;align-items:flex-end\">\n            <div style=\"width:3.5px;height:9px;background:#fff;border-radius:2px;opacity:.55\"><\u002Fdiv>\n            <div style=\"width:3.5px;height:14px;background:#fff;border-radius:2px\"><\u002Fdiv>\n            <div style=\"width:3.5px;height:6px;background:#fff;border-radius:2px;opacity:.55\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:Newsreader,serif;font-size:16px;line-height:1;color:#262b26\">Caseload<\u002Fdiv>\n          <div style=\"font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#9aa196;margin-top:3px\">Management<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <nav style=\"display:flex;flex-direction:column;gap:3px\">\n        <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"6\">\n          <button sc-camel-on-click=\"{{ n.onClick }}\" style=\"{{ n.style }}\">\n            <span style=\"{{ n.iconStyle }}\"><\u002Fspan>\n            <span style=\"flex:1;text-align:left\">{{ n.label }}<\u002Fspan>\n            <sc-if value=\"{{ n.hasBadge }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ n.badgeStyle }}\">{{ n.badge }}<\u002Fspan><\u002Fsc-if>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fnav>\n\n      <div style=\"margin-top:auto;padding:14px 10px 4px\">\n        <div style=\"font-size:11px;color:#9aa196;line-height:1.5;display:flex;gap:7px;align-items:flex-start\">\n          <span style=\"width:14px;height:14px;border-radius:50%;border:1.5px solid #c3c9bd;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:9px;color:#9aa196;font-weight:700\">✓<\u002Fspan>\n          <span>All data lives only on this device. Nothing is sent anywhere.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <!-- MAIN -->\n    <main style=\"flex:1;min-width:0;max-height:100vh;overflow-y:auto\">\n    <div style=\"max-width:1120px;margin:0 auto;padding:32px clamp(16px,4vw,40px) 80px\">\n\n      <sc-if value=\"{{ showNotice }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;align-items:center;gap:14px;background:#fbf6ee;border:1px solid #f0e4cf;border-radius:12px;padding:12px 16px;margin-bottom:24px\">\n        <span style=\"width:22px;height:22px;border-radius:50%;background:#f0e4cf;color:#8a6d1f;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0\">!<\u002Fspan>\n        <div style=\"flex:1;min-width:0;font-size:13px;color:#8a6d1f;line-height:1.45\">Your data is saved only in this browser, on this device. <b>Export a backup regularly — and before you close or clear your browser<\u002Fb> — so nothing is ever lost.<\u002Fdiv>\n        <button sc-camel-on-click=\"{{ exportData }}\" style=\"background:#fff;color:#8a6d1f;border:1px solid #e8d4a8;border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;flex-shrink:0;white-space:nowrap\">Export backup<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ dismissNotice }}\" style=\"background:none;border:none;color:#b6a06a;font-size:20px;line-height:1;padding:2px 4px;flex-shrink:0\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n\n      <!-- ============ THIS WEEK ============ -->\n      <sc-if value=\"{{ vWeek }}\" hint-placeholder-val=\"{{ true }}\">\n      <div data-screen-label=\"This week\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:26px\">\n          <div>\n            <div style=\"font-size:12.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:7px\">This week<\u002Fdiv>\n            <h1 style=\"font-family:Newsreader,serif;font-weight:400;font-size:32px;margin:0;color:#262b26;letter-spacing:-.01em\">{{ greeting }}<\u002Fh1>\n            <div style=\"font-size:14px;color:#6b746c;margin-top:6px\">Week commencing {{ weekCommencing }}<\u002Fdiv>\n          <\u002Fdiv>\n          <button sc-camel-on-click=\"{{ startGuided }}\" style=\"background:var(--accent);color:#fff;border:none;border-radius:11px;padding:12px 18px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:9px;box-shadow:0 3px 10px color-mix(in oklab,var(--accent) 30%,transparent)\" style-hover=\"background:color-mix(in oklab,var(--accent) 88%,black)\">\n            <span style=\"width:8px;height:8px;border-radius:50%;background:#fff;opacity:.85\"><\u002Fspan>Start weekly review\n          <\u002Fbutton>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fff;border:1px solid #e4e7e0;border-radius:18px;padding:52px 44px;text-align:center;max-width:560px;margin:20px auto\">\n            <div style=\"font-family:Newsreader,serif;font-size:26px;color:#262b26;margin-bottom:10px\">Let's set up your caseload<\u002Fdiv>\n            <div style=\"font-size:15px;color:#6b746c;line-height:1.6;margin-bottom:26px\">Add your clients and this tool keeps your capacity, forecast and follow-ups on the page — so it never lives in your head. A weekly glance is all it takes.<\u002Fdiv>\n            <div style=\"display:flex;gap:12px;justify-content:center\">\n              <button sc-camel-on-click=\"{{ openAdd }}\" style=\"background:var(--accent);color:#fff;border:none;border-radius:11px;padding:12px 20px;font-size:14px;font-weight:600\">Add your first client<\u002Fbutton>\n              <button sc-camel-on-click=\"{{ seedSample }}\" style=\"background:#fff;color:#3c443b;border:1px solid #d9dcd5;border-radius:11px;padding:12px 20px;font-size:14px;font-weight:600\">Explore with sample data<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ notEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <!-- stat tiles -->\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:22px\">\n            <div style=\"background:#fff;border:1px solid #e4e7e0;border-radius:15px;padding:20px 22px\">\n              <div style=\"font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:10px\">Slots used this week<\u002Fdiv>\n              <div style=\"display:flex;align-items:baseline;gap:8px\">\n                <span style=\"font-family:Newsreader,serif;font-size:38px;line-height:1;color:{{ usedColor }}\">{{ usedNow }}<\u002Fspan>\n                <span style=\"font-size:15px;color:#9aa196\">of {{ target }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"height:7px;background:#eef0ea;border-radius:4px;margin-top:14px;overflow:hidden\"><div style=\"{{ usedBarStyle }}\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #e4e7e0;border-radius:15px;padding:20px 22px\">\n              <div style=\"font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:10px\">Safe to offer now<\u002Fdiv>\n              <div style=\"display:flex;align-items:baseline;gap:8px\">\n                <span style=\"font-family:Newsreader,serif;font-size:38px;line-height:1;color:var(--accent)\">{{ freeNow }}<\u002Fspan>\n                <span style=\"font-size:15px;color:#9aa196\">slots<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#9aa196;margin-top:14px\">{{ freeSubtitle }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #e4e7e0;border-radius:15px;padding:20px 22px\">\n              <div style=\"font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:10px\">Needs you this week<\u002Fdiv>\n              <div style=\"display:flex;align-items:baseline;gap:8px\">\n                <span style=\"font-family:Newsreader,serif;font-size:38px;line-height:1;color:{{ needColor }}\">{{ needCount }}<\u002Fspan>\n                <span style=\"font-size:15px;color:#9aa196\">{{ needNoun }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#9aa196;margin-top:14px\">{{ needSubtitle }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- needs action list -->\n          <div style=\"display:flex;flex-wrap:wrap;gap:20px;align-items:start\">\n            <div style=\"flex:2 1 380px;min-width:0;background:#fff;border:1px solid #e4e7e0;border-radius:16px;overflow:hidden\">\n              <div style=\"padding:17px 22px;border-bottom:1px solid #eef0ea;display:flex;justify-content:space-between;align-items:center\">\n                <div style=\"font-weight:600;font-size:15px;color:#262b26\">What needs you<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#9aa196\">{{ needCount }} to action<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ hasActions }}\" hint-placeholder-val=\"{{ true }}\">\n                <div>\n                  <sc-for list=\"{{ actionList }}\" as=\"c\" hint-placeholder-count=\"3\">\n                    <div style=\"padding:16px 22px;border-bottom:1px solid #f2f4ef;display:flex;justify-content:space-between;align-items:center;gap:14px\">\n                      <div style=\"min-width:0\">\n                        <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:4px\">\n                          <span style=\"font-weight:600;font-size:14.5px;color:#262b26\">{{ c.name }}<\u002Fspan>\n                          <span style=\"{{ c.pillStyle }}\">{{ c.actionLabel }}<\u002Fspan>\n                        <\u002Fdiv>\n                        <div style=\"font-size:12.5px;color:#8a9187\">{{ c.subtitle }}<\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"display:flex;gap:8px;flex-shrink:0\">\n                        <sc-for list=\"{{ c.actions }}\" as=\"a\" hint-placeholder-count=\"2\">\n                          <button sc-camel-on-click=\"{{ a.onClick }}\" style=\"{{ a.style }}\">{{ a.label }}<\u002Fbutton>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ noActions }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"padding:44px 22px;text-align:center\">\n                  <div style=\"font-family:Newsreader,serif;font-size:20px;color:#3c443b;margin-bottom:6px\">You're all clear<\u002Fdiv>\n                  <div style=\"font-size:13.5px;color:#8a9187\">Nothing needs deciding this week. Close the tab — see you next Friday.<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <div style=\"flex:1 1 260px;min-width:0;display:flex;flex-direction:column;gap:16px\">\n              <div style=\"background:#fff;border:1px solid #e4e7e0;border-radius:16px;padding:19px 21px\">\n                <div style=\"font-weight:600;font-size:14.5px;color:#262b26;margin-bottom:4px\">Can I take a new client?<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#9aa196;margin-bottom:14px\">Earliest opening you can promise safely.<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:9px\">\n                  <sc-for list=\"{{ availTop }}\" as=\"a\" hint-placeholder-count=\"3\">\n                    <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px\">\n                      <span style=\"font-size:13.5px;color:#3c443b\">{{ a.freq }}<\u002Fspan>\n                      <span style=\"{{ a.style }}\">{{ a.text }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ hasWaitDue }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:#fff;border:1px solid #e4e7e0;border-radius:16px;padding:19px 21px\">\n                  <div style=\"font-weight:600;font-size:14.5px;color:#262b26;margin-bottom:14px\">Waitlist check-ins due<\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:11px\">\n                    <sc-for list=\"{{ waitDue }}\" as=\"w\" hint-placeholder-count=\"2\">\n                      <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px\">\n                        <div><div style=\"font-size:13.5px;color:#3c443b;font-weight:500\">{{ w.name }}<\u002Fdiv><div style=\"font-size:11.5px;color:#a4432e\">{{ w.daysText }}<\u002Fdiv><\u002Fdiv>\n                        <button sc-camel-on-click=\"{{ w.onMessage }}\" style=\"background:#fff;color:var(--accent);border:1px solid color-mix(in oklab,var(--accent) 35%,white);border-radius:8px;padding:6px 11px;font-size:12.5px;font-weight:600\">Message<\u002Fbutton>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ CASELOAD ============ -->\n      <sc-if value=\"{{ vCaseload }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Caseload\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px\">\n          <div>\n            <h1 style=\"font-family:Newsreader,serif;font-weight:400;font-size:30px;margin:0;color:#262b26\">Caseload<\u002Fh1>\n            <div style=\"font-size:14px;color:#6b746c;margin-top:5px\">Your live client list. Everything else updates from here.<\u002Fdiv>\n          <\u002Fdiv>\n          <button sc-camel-on-click=\"{{ openAdd }}\" style=\"background:var(--accent);color:#fff;border:none;border-radius:11px;padding:11px 17px;font-size:14px;font-weight:600\">+ Add client<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:8px;margin-bottom:16px\">\n          <sc-for list=\"{{ filters }}\" as=\"f\" hint-placeholder-count=\"4\">\n            <button sc-camel-on-click=\"{{ f.onClick }}\" style=\"{{ f.style }}\">{{ f.label }} <span style=\"opacity:.6\">{{ f.count }}<\u002Fspan><\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ hasRows }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:#fff;border:1px solid #e4e7e0;border-radius:16px;overflow:hidden\">\n          <div style=\"display:grid;grid-template-columns:minmax(0,2fr) minmax(0,1fr) minmax(0,1.1fr) minmax(96px,1fr);gap:10px;padding:13px 22px;border-bottom:1px solid #eef0ea;background:#fafbf8;font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#9aa196\">\n            <div>Client<\u002Fdiv><div>Status<\u002Fdiv><div>Block ends<\u002Fdiv><div style=\"text-align:right\">Action<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ rows }}\" as=\"c\" hint-placeholder-count=\"5\">\n            <div sc-camel-on-click=\"{{ c.onEdit }}\" style=\"display:grid;grid-template-columns:minmax(0,2fr) minmax(0,1fr) minmax(0,1.1fr) minmax(96px,1fr);gap:10px;padding:var(--rowpad);border-bottom:1px solid #f2f4ef;align-items:center;cursor:pointer\" style-hover=\"background:#fafbf8\">\n              <div style=\"min-width:0\">\n                <div style=\"font-weight:600;font-size:14px;color:#262b26;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ c.name }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:#a0a69c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ c.metaLine }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"min-width:0\"><span style=\"{{ c.statusStyle }}\">{{ c.status }}<\u002Fspan><\u002Fdiv>\n              <div style=\"min-width:0\"><div style=\"font-size:13.5px;color:#3c443b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ c.endsText }}<\u002Fdiv><div style=\"font-size:11.5px;color:{{ c.endsRelColor }}\">{{ c.endsRel }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;justify-content:flex-end;min-width:0\">\n                <span style=\"{{ c.pillStyle }}\">{{ c.actionLabel }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noRows }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fff;border:1px dashed #d5d9cf;border-radius:16px;padding:46px;text-align:center;color:#8a9187;font-size:14px\">No clients in this view. <a sc-camel-on-click=\"{{ openAdd }}\" style=\"cursor:pointer;font-weight:600\">Add one<\u002Fa> to begin.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ FORECAST ============ -->\n      <sc-if value=\"{{ vForecast }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Forecast\">\n        <div style=\"margin-bottom:22px\">\n          <h1 style=\"font-family:Newsreader,serif;font-weight:400;font-size:30px;margin:0;color:#262b26\">Forecast<\u002Fh1>\n          <div style=\"font-size:14px;color:#6b746c;margin-top:5px;max-width:680px;line-height:1.55\">Rolling {{ weeks }}-week view. <b style=\"color:#5c645a\">Slots used<\u002Fb> assumes everyone re-books. <b style=\"color:#5c645a\">Safe to offer<\u002Fb> is what you can promise now. <b style=\"color:#5c645a\">Best case<\u002Fb> is the upside if finishing clients don't continue.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-wrap:wrap;gap:20px;align-items:start\">\n          <div style=\"flex:2 1 420px;min-width:0;background:#fff;border:1px solid #e4e7e0;border-radius:16px;overflow-x:auto\">\n            <div style=\"min-width:480px\">\n            <div style=\"display:grid;grid-template-columns:1.1fr .8fr .9fr .8fr 1.8fr;padding:13px 20px;border-bottom:1px solid #eef0ea;background:#fafbf8;font-size:11.5px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:#9aa196\">\n              <div>Week<\u002Fdiv><div>Used<\u002Fdiv><div>Safe<\u002Fdiv><div>Best<\u002Fdiv><div>Decisions<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ forecastRows }}\" as=\"r\" hint-placeholder-count=\"8\">\n              <div style=\"display:grid;grid-template-columns:1.1fr .8fr .9fr .8fr 1.8fr;padding:12px 20px;border-bottom:1px solid #f2f4ef;align-items:center;font-size:13.5px\">\n                <div style=\"color:#3c443b;font-weight:500\">{{ r.wkText }}<\u002Fdiv>\n                <div><span style=\"{{ r.usedStyle }}\">{{ r.used }}<\u002Fspan><\u002Fdiv>\n                <div style=\"color:#5c645a\">{{ r.safe }}<\u002Fdiv>\n                <div style=\"color:#5c645a\">{{ r.best }}<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#8a9187;line-height:1.4\">{{ r.decisions }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"flex:1 1 240px;min-width:0;display:flex;flex-direction:column;gap:16px\">\n            <div style=\"background:var(--accent);border-radius:16px;padding:20px 22px;color:#fff\">\n              <div style=\"font-size:12.5px;font-weight:600;opacity:.85;margin-bottom:8px\">Weekly target<\u002Fdiv>\n              <div style=\"font-family:Newsreader,serif;font-size:34px;line-height:1\">{{ target }} slots<\u002Fdiv>\n              <div style=\"font-size:12.5px;opacity:.82;margin-top:8px\">Currently running {{ usedNow }}.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #e4e7e0;border-radius:16px;padding:19px 21px\">\n              <div style=\"font-weight:600;font-size:14.5px;color:#262b26;margin-bottom:4px\">Can I take a new client?<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#9aa196;margin-bottom:15px\">Earliest opening per frequency.<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:11px\">\n                <sc-for list=\"{{ availAll }}\" as=\"a\" hint-placeholder-count=\"6\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px\">\n                    <span style=\"font-size:13.5px;color:#3c443b\">{{ a.freq }}<\u002Fspan>\n                    <span style=\"{{ a.style }}\">{{ a.text }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ WAITLIST ============ -->\n      <sc-if value=\"{{ vWaitlist }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Waitlist\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px\">\n          <div>\n            <h1 style=\"font-family:Newsreader,serif;font-weight:400;font-size:30px;margin:0;color:#262b26\">Waitlist<\u002Fh1>\n            <div style=\"font-size:14px;color:#6b746c;margin-top:5px\">Families waiting for a space. Amber after 14 days, red after 21 — time for a warm check-in.<\u002Fdiv>\n          <\u002Fdiv>\n          <button sc-camel-on-click=\"{{ openAddWait }}\" style=\"background:var(--accent);color:#fff;border:none;border-radius:11px;padding:11px 17px;font-size:14px;font-weight:600\">+ Add to waitlist<\u002Fbutton>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ hasWait }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:#fff;border:1px solid #e4e7e0;border-radius:16px;overflow:hidden\">\n          <div style=\"display:grid;grid-template-columns:1.5fr 1fr 1fr 1.2fr 1.3fr;padding:13px 22px;border-bottom:1px solid #eef0ea;background:#fafbf8;font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#9aa196\">\n            <div>Name<\u002Fdiv><div>Need<\u002Fdiv><div>Added<\u002Fdiv><div>Since contact<\u002Fdiv><div><\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ waitRows }}\" as=\"w\" hint-placeholder-count=\"4\">\n            <div style=\"display:grid;grid-template-columns:1.5fr 1fr 1fr 1.2fr 1.3fr;padding:var(--rowpad);border-bottom:1px solid #f2f4ef;align-items:center;font-size:13.5px\">\n              <div style=\"font-weight:600;color:#262b26\">{{ w.name }}<sc-if value=\"{{ w.hasNotes }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:12px;color:#a0a69c;font-weight:400\">{{ w.notes }}<\u002Fdiv><\u002Fsc-if><\u002Fdiv>\n              <div style=\"color:#5c645a\">{{ w.need }}<\u002Fdiv>\n              <div style=\"color:#8a9187\">{{ w.addedText }}<\u002Fdiv>\n              <div><span style=\"{{ w.dayStyle }}\">{{ w.daysText }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:7px;justify-content:flex-end\">\n                <button sc-camel-on-click=\"{{ w.onMessage }}\" style=\"background:#fff;color:var(--accent);border:1px solid color-mix(in oklab,var(--accent) 32%,white);border-radius:8px;padding:6px 11px;font-size:12.5px;font-weight:600\">Message<\u002Fbutton>\n                <button sc-camel-on-click=\"{{ w.onEdit }}\" style=\"background:#fff;color:#6b746c;border:1px solid #dde0d8;border-radius:8px;padding:6px 11px;font-size:12.5px;font-weight:600\">Edit<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noWait }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fff;border:1px dashed #d5d9cf;border-radius:16px;padding:46px;text-align:center;color:#8a9187;font-size:14px\">No one waiting. When the forecast shows a free slot, add prospective clients here.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ MESSAGES ============ -->\n      <sc-if value=\"{{ vMessages }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Messages\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;gap:16px;flex-wrap:wrap\">\n          <div>\n            <h1 style=\"font-family:Newsreader,serif;font-weight:400;font-size:30px;margin:0;color:#262b26\">Message templates<\u002Fh1>\n            <div style=\"font-size:14px;color:#6b746c;margin-top:5px;max-width:620px;line-height:1.55\">Yours to edit — type straight into any template and it saves as you go. The tagged ones open pre-filled from your one-click caseload actions. Add as many of your own as you like.<\u002Fdiv>\n          <\u002Fdiv>\n          <button sc-camel-on-click=\"{{ addTemplate }}\" style=\"background:var(--accent);color:#fff;border:none;border-radius:11px;padding:11px 17px;font-size:14px;font-weight:600;white-space:nowrap\">+ New template<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px\">\n          <sc-for list=\"{{ templates }}\" as=\"t\" hint-placeholder-count=\"5\">\n            <div style=\"background:#fff;border:1px solid #e4e7e0;border-radius:15px;padding:18px 20px;display:flex;flex-direction:column\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px\">\n                <sc-raw-select value=\"{{ t.role }}\" sc-camel-on-change=\"{{ t.onRole }}\" style=\"border:1px solid #e4e7e0;border-radius:999px;padding:4px 10px;font-size:11.5px;font-weight:600;color:var(--accent);background:color-mix(in oklab,var(--accent) 8%,white);outline:none;cursor:pointer;max-width:190px\" style-focus=\"border-color:var(--accent)\">\n                  <sc-for list=\"{{ roleOptions }}\" as=\"o\" hint-placeholder-count=\"6\"><option value=\"{{ o.value }}\">{{ o.label }}<\u002Foption><\u002Fsc-for>\n                <\u002Fsc-raw-select>\n                <div style=\"display:flex;gap:7px;flex-shrink:0\">\n                  <button sc-camel-on-click=\"{{ t.onCopy }}\" style=\"background:color-mix(in oklab,var(--accent) 10%,white);color:var(--accent);border:none;border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:600\">Copy<\u002Fbutton>\n                  <sc-if value=\"{{ t.isCustom }}\" hint-placeholder-val=\"{{ false }}\"><button sc-camel-on-click=\"{{ t.onDelete }}\" style=\"background:none;border:1px solid #e7c9c0;color:#a4432e;border-radius:8px;padding:6px 10px;font-size:12.5px;font-weight:600\">Delete<\u002Fbutton><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <input value=\"{{ t.title }}\" sc-camel-on-input=\"{{ t.onTitle }}\" placeholder=\"Template name\" style=\"width:100%;border:none;border-bottom:1px solid transparent;font-family:'Public Sans',sans-serif;font-weight:600;font-size:14.5px;color:#262b26;padding:4px 0;margin-bottom:8px;outline:none;background:none\" style-focus=\"border-bottom-color:var(--accent)\">\n              <textarea value=\"{{ t.body }}\" sc-camel-on-input=\"{{ t.onBody }}\" placeholder=\"Write your message. Use [Client], [Contact name], [date] and [Your name] — they fill in automatically.\" style=\"width:100%;min-height:150px;border:1px solid #eef0ea;border-radius:10px;padding:12px 13px;font-family:'Public Sans',sans-serif;font-size:13px;line-height:1.55;color:#5c645a;outline:none;resize:vertical;background:#fcfdfb\" style-focus=\"border-color:var(--accent);background:#fff\"><\u002Ftextarea>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ SETTINGS ============ -->\n      <sc-if value=\"{{ vSettings }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Settings\">\n        <div style=\"margin-bottom:24px\">\n          <h1 style=\"font-family:Newsreader,serif;font-weight:400;font-size:30px;margin:0;color:#262b26\">Settings<\u002Fh1>\n          <div style=\"font-size:14px;color:#6b746c;margin-top:5px\">Set your capacity rules once. Every other tab updates itself.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;gap:18px;max-width:720px\">\n          <div style=\"background:#fff;border:1px solid #e4e7e0;border-radius:16px;padding:24px 26px\">\n            <div style=\"font-weight:600;font-size:15px;color:#262b26;margin-bottom:18px\">Your practice<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:18px\">\n              <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Your name<\u002Flabel><input value=\"{{ set.yourName }}\" sc-camel-on-input=\"{{ sh.yourName }}\" placeholder=\"For message sign-offs\" style=\"width:100%;padding:9px 11px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Fdiv>\n              <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Target clients (slots) per week<\u002Flabel><input value=\"{{ set.target }}\" sc-camel-on-input=\"{{ sh.target }}\" type=\"number\" style=\"width:100%;padding:9px 11px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Fdiv>\n              <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Weeks to forecast (1–26)<\u002Flabel><input value=\"{{ set.weeks }}\" sc-camel-on-input=\"{{ sh.weeks }}\" type=\"number\" style=\"width:100%;padding:9px 11px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Fdiv>\n              <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Heads-up before a block ends (weeks)<\u002Flabel><input value=\"{{ set.lead }}\" sc-camel-on-input=\"{{ sh.lead }}\" type=\"number\" style=\"width:100%;padding:9px 11px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff;border:1px solid #e4e7e0;border-radius:16px;padding:24px 26px\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px\">\n              <div style=\"font-weight:600;font-size:15px;color:#262b26\">Frequencies<\u002Fdiv>\n              <button sc-camel-on-click=\"{{ addFreq }}\" style=\"background:#fff;color:var(--accent);border:1px solid color-mix(in oklab,var(--accent) 32%,white);border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:600\">+ Add<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#9aa196;margin-bottom:16px\">Weekly load = fraction of one weekly slot a client uses (weekly = 1, fortnightly = 0.5). Gap = weeks between sessions.<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr 40px;gap:10px;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#9aa196;margin-bottom:9px;padding:0 2px\">\n              <div>Name<\u002Fdiv><div>Weekly load<\u002Fdiv><div>Gap (wks)<\u002Fdiv><div><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <sc-for list=\"{{ freqRows }}\" as=\"f\" hint-placeholder-count=\"6\">\n                <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr 40px;gap:10px;align-items:center\">\n                  <input value=\"{{ f.name }}\" sc-camel-on-input=\"{{ f.onName }}\" style=\"width:100%;padding:8px 10px;border:1px solid #e0e3dc;border-radius:8px;font-size:13.5px;outline:none\" style-focus=\"border-color:var(--accent)\">\n                  <input value=\"{{ f.load }}\" sc-camel-on-input=\"{{ f.onLoad }}\" type=\"number\" step=\"0.01\" style=\"width:100%;padding:8px 10px;border:1px solid #e0e3dc;border-radius:8px;font-size:13.5px;outline:none\" style-focus=\"border-color:var(--accent)\">\n                  <input value=\"{{ f.gap }}\" sc-camel-on-input=\"{{ f.onGap }}\" type=\"number\" step=\"0.5\" style=\"width:100%;padding:8px 10px;border:1px solid #e0e3dc;border-radius:8px;font-size:13.5px;outline:none\" style-focus=\"border-color:var(--accent)\">\n                  <button sc-camel-on-click=\"{{ f.onRemove }}\" style=\"background:none;border:none;color:#c0655a;font-size:18px;line-height:1;padding:4px\">×<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ BACKUP ============ -->\n      <sc-if value=\"{{ vBackup }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Backup\">\n        <div style=\"margin-bottom:24px\">\n          <h1 style=\"font-family:Newsreader,serif;font-weight:400;font-size:30px;margin:0;color:#262b26\">Backup &amp; data<\u002Fh1>\n          <div style=\"font-size:14px;color:#6b746c;margin-top:5px\">Your only copy lives in this browser. Export regularly — and always before closing or clearing it.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;gap:18px;max-width:720px\">\n          <div style=\"background:#fff;border:1px solid #e4e7e0;border-radius:16px;padding:24px 26px\">\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px\">\n              <div style=\"font-weight:600;font-size:15px;color:#262b26\">Auto-save to a file<\u002Fdiv>\n              <sc-if value=\"{{ fsLinked }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"background:color-mix(in oklab,var(--accent) 14%,white);color:var(--accent);font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px\">On<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"font-size:13px;color:#6b746c;line-height:1.6;margin-bottom:18px\">Link a file on your computer and every change writes to it automatically — no need to remember to export. The file stays on your device.<\u002Fdiv>\n\n            <sc-if value=\"{{ fsSupported }}\" hint-placeholder-val=\"{{ true }}\">\n              <sc-if value=\"{{ fsLinked }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:#f5f8f4;border:1px solid #e0e8dd;border-radius:11px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:11px\">\n                  <span style=\"width:9px;height:9px;border-radius:50%;background:var(--accent);flex-shrink:0\"><\u002Fspan>\n                  <div style=\"font-size:13px;color:#3c443b;line-height:1.4\">{{ fsStatus }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n                  <sc-if value=\"{{ fsNeedsReconnect }}\" hint-placeholder-val=\"{{ false }}\"><button sc-camel-on-click=\"{{ reconnectSaveFile }}\" style=\"background:var(--accent);color:#fff;border:none;border-radius:9px;padding:9px 15px;font-size:13.5px;font-weight:600\">Reconnect<\u002Fbutton><\u002Fsc-if>\n                  <button sc-camel-on-click=\"{{ disconnectSaveFile }}\" style=\"background:#fff;color:#6b746c;border:1px solid #d9dcd5;border-radius:9px;padding:9px 15px;font-size:13.5px;font-weight:600\">Turn off auto-save<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ notFsLinked }}\" hint-placeholder-val=\"{{ true }}\">\n                <button sc-camel-on-click=\"{{ connectSaveFile }}\" style=\"background:var(--accent);color:#fff;border:none;border-radius:9px;padding:10px 17px;font-size:13.5px;font-weight:600\">Turn on auto-save<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ fsUnsupported }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#f7f8f5;border:1px solid #e6e9e2;border-radius:11px;padding:14px 16px;font-size:13px;color:#5c645a;line-height:1.55\">Everything else works exactly the same in this browser. This one convenience — writing straight to a file — is only offered by Chrome and Edge. In Safari or Firefox, just use <b>Export<\u002Fb> below whenever you finish a session.<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ fsHasError }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top:12px;font-size:12.5px;color:#a4432e\">{{ fsError }}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff;border:1px solid #e4e7e0;border-radius:16px;padding:24px 26px\">\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px\">\n              <div style=\"font-weight:600;font-size:15px;color:#262b26\">Export &amp; restore<\u002Fdiv>\n              <span style=\"background:color-mix(in oklab,var(--accent) 12%,white);color:var(--accent);font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px\">On this device only<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:13px;color:#6b746c;line-height:1.6;margin-bottom:20px\">Export writes a single backup file you can keep somewhere safe or move to another computer. Import restores everything from a backup file. Nothing is ever sent to a server — there is no account and no cloud.<\u002Fdiv>\n\n            <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n              <button sc-camel-on-click=\"{{ exportData }}\" style=\"background:var(--accent);color:#fff;border:none;border-radius:9px;padding:10px 17px;font-size:13.5px;font-weight:600\">Export all my data<\u002Fbutton>\n              <label style=\"background:#fff;color:#3c443b;border:1px solid #d9dcd5;border-radius:9px;padding:10px 16px;font-size:13.5px;font-weight:600;cursor:pointer\">Import backup<input type=\"file\" accept=\"application/json\" sc-camel-on-change=\"{{ importData }}\" style=\"display:none\"><\u002Flabel>\n              <button sc-camel-on-click=\"{{ seedSample }}\" style=\"background:#fff;color:#3c443b;border:1px solid #d9dcd5;border-radius:9px;padding:10px 16px;font-size:13.5px;font-weight:600\">Load sample data<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ hasRetention }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#fbf6ee;border:1px solid #f0e4cf;border-radius:16px;padding:20px 22px;display:flex;justify-content:space-between;align-items:center;gap:14px\">\n              <div><div style=\"font-weight:600;font-size:14px;color:#8a6d1f;margin-bottom:3px\">Old records<\u002Fdiv><div style=\"font-size:13px;color:#8a6d1f;line-height:1.5\">{{ retentionText }}<\u002Fdiv><\u002Fdiv>\n              <button sc-camel-on-click=\"{{ archiveOld }}\" style=\"background:#fff;color:#8a6d1f;border:1px solid #e8d4a8;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;flex-shrink:0;white-space:nowrap\">Archive them<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"background:#fff;border:1px solid #e7c9c0;border-radius:16px;padding:24px 26px\">\n            <div style=\"font-weight:600;font-size:15px;color:#262b26;margin-bottom:6px\">Delete all data<\u002Fdiv>\n            <div style=\"font-size:13px;color:#6b746c;line-height:1.6;margin-bottom:18px\">This permanently removes every client, waitlist entry and setting from this device. Export a backup first if there's any chance you'll need it.<\u002Fdiv>\n            <button sc-camel-on-click=\"{{ askDeleteAll }}\" style=\"background:#fff;color:#a4432e;border:1px solid #e7c9c0;border-radius:9px;padding:9px 15px;font-size:13.5px;font-weight:600\">Delete everything<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <!-- EDIT DRAWER -->\n  <sc-if value=\"{{ drawerOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div>\n    <div sc-camel-on-click=\"{{ cancelDraft }}\" style=\"position:fixed;inset:0;background:rgba(38,43,38,.34);z-index:40;animation:cmtFade .2s ease\"><\u002Fdiv>\n    <div style=\"position:fixed;top:0;right:0;bottom:0;width:440px;max-width:92vw;background:#fff;z-index:41;box-shadow:-14px 0 44px rgba(38,43,38,.14);animation:cmtDrawer .28s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column\">\n      <div style=\"padding:24px 28px;border-bottom:1px solid #eef0ea;display:flex;justify-content:space-between;align-items:center\">\n        <div style=\"font-family:Newsreader,serif;font-size:22px;color:#262b26\">{{ drawerTitle }}<\u002Fdiv>\n        <button sc-camel-on-click=\"{{ cancelDraft }}\" style=\"background:none;border:none;font-size:24px;color:#9aa196;line-height:1;padding:2px 6px\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:16px\">\n        <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Client name<\u002Flabel><input value=\"{{ draft.name }}\" sc-camel-on-input=\"{{ dh.name }}\" placeholder=\"e.g. Alex Morgan\" style=\"width:100%;padding:10px 12px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Fdiv>\n        <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Contact name <span style=\"color:#b6bbb0;font-weight:400\">(optional)<\u002Fspan><\u002Flabel><input value=\"{{ draft.contact }}\" sc-camel-on-input=\"{{ dh.contact }}\" placeholder=\"e.g. parent or next of kin\" style=\"width:100%;padding:10px 12px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n          <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Frequency<\u002Flabel>\n            <sc-raw-select value=\"{{ draft.frequency }}\" sc-camel-on-change=\"{{ dh.frequency }}\" style=\"width:100%;padding:10px 12px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none;background:#fff\" style-focus=\"border-color:var(--accent)\">\n              <sc-for list=\"{{ freqNames }}\" as=\"fn\" hint-placeholder-count=\"6\"><option value=\"{{ fn }}\">{{ fn }}<\u002Foption><\u002Fsc-for>\n            <\u002Fsc-raw-select>\n          <\u002Fdiv>\n          <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Status<\u002Flabel>\n            <sc-raw-select value=\"{{ draft.status }}\" sc-camel-on-change=\"{{ dh.status }}\" style=\"width:100%;padding:10px 12px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none;background:#fff\" style-focus=\"border-color:var(--accent)\">\n              <option value=\"Active\">Active<\u002Foption><option value=\"Holding\">Holding<\u002Foption><option value=\"Discharged\">Discharged<\u002Foption>\n            <\u002Fsc-raw-select>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n          <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Block start date<\u002Flabel><input value=\"{{ draft.blockStart }}\" sc-camel-on-input=\"{{ dh.blockStart }}\" type=\"date\" style=\"width:100%;padding:10px 12px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Fdiv>\n          <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Block length (sessions)<\u002Flabel><input value=\"{{ draft.blockLength }}\" sc-camel-on-input=\"{{ dh.blockLength }}\" type=\"number\" style=\"width:100%;padding:10px 12px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n          <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Pushed back (weeks)<\u002Flabel><input value=\"{{ draft.pushedBack }}\" sc-camel-on-input=\"{{ dh.pushedBack }}\" type=\"number\" placeholder=\"0\" style=\"width:100%;padding:10px 12px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Fdiv>\n          <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Re-book likelihood<\u002Flabel>\n            <sc-raw-select value=\"{{ draft.rebook }}\" sc-camel-on-change=\"{{ dh.rebook }}\" style=\"width:100%;padding:10px 12px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none;background:#fff\" style-focus=\"border-color:var(--accent)\">\n              <option value=\"\">Unsure<\u002Foption><option value=\"Likely to continue\">Likely to continue<\u002Foption><option value=\"Likely to finish\">Likely to finish<\u002Foption>\n            <\u002Fsc-raw-select>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ draftHolding }}\" hint-placeholder-val=\"{{ false }}\">\n          <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Reply by (while holding their slot)<\u002Flabel><input value=\"{{ draft.replyBy }}\" sc-camel-on-input=\"{{ dh.replyBy }}\" type=\"date\" style=\"width:100%;padding:10px 12px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Fdiv>\n        <\u002Fsc-if>\n        <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Notes<\u002Flabel><textarea value=\"{{ draft.notes }}\" sc-camel-on-input=\"{{ dh.notes }}\" rows=\"3\" placeholder=\"Anything you want to remember\" style=\"width:100%;padding:10px 12px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none;resize:vertical;line-height:1.5\" style-focus=\"border-color:var(--accent)\"><\u002Ftextarea><\u002Fdiv>\n\n        <sc-if value=\"{{ draftComputed }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fafbf8;border:1px solid #eef0ea;border-radius:11px;padding:14px 16px;font-size:13px;color:#5c645a;line-height:1.6\">{{ draftSummary }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"padding:18px 28px;border-top:1px solid #eef0ea;display:flex;justify-content:space-between;align-items:center\">\n        <sc-if value=\"{{ canDelete }}\" hint-placeholder-val=\"{{ false }}\"><button sc-camel-on-click=\"{{ deleteDraft }}\" style=\"background:none;border:none;color:#a4432e;font-size:13.5px;font-weight:600;padding:6px\">Delete<\u002Fbutton><\u002Fsc-if>\n        <div style=\"display:flex;gap:10px;margin-left:auto\">\n          <button sc-camel-on-click=\"{{ cancelDraft }}\" style=\"background:#fff;color:#6b746c;border:1px solid #d9dcd5;border-radius:9px;padding:10px 16px;font-size:14px;font-weight:600\">Cancel<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ saveDraft }}\" style=\"background:var(--accent);color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:600\">Save<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- WAITLIST DRAWER -->\n  <sc-if value=\"{{ waitDrawerOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div>\n    <div sc-camel-on-click=\"{{ cancelWait }}\" style=\"position:fixed;inset:0;background:rgba(38,43,38,.34);z-index:40;animation:cmtFade .2s ease\"><\u002Fdiv>\n    <div style=\"position:fixed;top:0;right:0;bottom:0;width:400px;max-width:92vw;background:#fff;z-index:41;box-shadow:-14px 0 44px rgba(38,43,38,.14);animation:cmtDrawer .28s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column\">\n      <div style=\"padding:24px 28px;border-bottom:1px solid #eef0ea;display:flex;justify-content:space-between;align-items:center\">\n        <div style=\"font-family:Newsreader,serif;font-size:22px;color:#262b26\">{{ waitDrawerTitle }}<\u002Fdiv>\n        <button sc-camel-on-click=\"{{ cancelWait }}\" style=\"background:none;border:none;font-size:24px;color:#9aa196;line-height:1;padding:2px 6px\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:16px\">\n        <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Name<\u002Flabel><input value=\"{{ wdraft.name }}\" sc-camel-on-input=\"{{ wdh.name }}\" placeholder=\"Who's waiting\" style=\"width:100%;padding:10px 12px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Fdiv>\n        <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Need (frequency)<\u002Flabel>\n          <sc-raw-select value=\"{{ wdraft.need }}\" sc-camel-on-change=\"{{ wdh.need }}\" style=\"width:100%;padding:10px 12px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none;background:#fff\" style-focus=\"border-color:var(--accent)\">\n            <sc-for list=\"{{ freqNames }}\" as=\"fn\" hint-placeholder-count=\"6\"><option value=\"{{ fn }}\">{{ fn }}<\u002Foption><\u002Fsc-for>\n          <\u002Fsc-raw-select>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n          <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Date added<\u002Flabel><input value=\"{{ wdraft.added }}\" sc-camel-on-input=\"{{ wdh.added }}\" type=\"date\" style=\"width:100%;padding:10px 12px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Fdiv>\n          <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Last contacted<\u002Flabel><input value=\"{{ wdraft.lastContacted }}\" sc-camel-on-input=\"{{ wdh.lastContacted }}\" type=\"date\" style=\"width:100%;padding:10px 12px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none\" style-focus=\"border-color:var(--accent)\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div><label style=\"display:block;font-size:12.5px;font-weight:600;color:#6b746c;margin-bottom:6px\">Notes<\u002Flabel><textarea value=\"{{ wdraft.notes }}\" sc-camel-on-input=\"{{ wdh.notes }}\" rows=\"3\" style=\"width:100%;padding:10px 12px;border:1px solid #d9dcd5;border-radius:9px;font-size:14px;outline:none;resize:vertical;line-height:1.5\" style-focus=\"border-color:var(--accent)\"><\u002Ftextarea><\u002Fdiv>\n      <\u002Fd
